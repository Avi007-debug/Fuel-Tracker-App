name: fuel_tracker_app
description: "Activa Tracker — Smart Personal Vehicle Companion"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Charts & Visualizations
  fl_chart: ^0.69.2

  # Notifications
  flutter_local_notifications: ^18.0.1
  workmanager: ^0.5.2
  timezone: ^0.9.4

  # Networking & Parsing
  http: ^1.3.0
  html: ^0.15.5

  # Storage & File System
  path_provider: ^2.1.5
  shared_preferences: ^2.3.4

  # Export
  share_plus: ^10.1.4

  # Media
  image_picker: ^1.1.2

  # Maps / Navigation
  url_launcher: ^6.3.1

  # Utilities
  intl: ^0.20.2
  google_fonts: ^6.2.1
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

